database:
  path: jobscout.sqlite3

schedule:
  collection_time: "08:00"
  scoring_time: "08:30"

scoring:
  ai_enabled: false

collection:
  lookback_days: 30
  keywords: [rag, llm, agent]

cleanup:
  stale_days: 30

collectors:
  mock:
    enabled: false
  bmw:
    enabled: true
  porsche:
    enabled: true
  mercedes_benz:
    enabled: true
  volkswagen:
    enabled: true
  siemens:
    enabled: true
  sap:
    enabled: true
  allianz:
    enabled: true
  microsoft_germany:
    enabled: true
  google:
    enabled: true
  meta:
    enabled: true
  apple:
    enabled: true
  amazon:
    enabled: true
  # Config-driven ATS boards: add a company by adding a slug here (no code needed).
  # locations: optional substring allow-list applied to the job's location field.
  # Not on these platforms (verified 2026-07): deepl, alephalpha, cohere,
  # huggingface, perplexityai - would need their own collectors.
  greenhouse:
    enabled: true
    boards:
      - {slug: anthropic, company: Anthropic, locations: [remote, germany, london, zurich, europe]}
      - {slug: celonis, company: Celonis}
      - {slug: helsing, company: Helsing}
      - {slug: parloa, company: Parloa}
      - {slug: scaleai, company: Scale AI, locations: [remote, germany, london, europe]}
      - {slug: wayve, company: Wayve}
      - {slug: deepmind, company: Google DeepMind}
      - {slug: blackforestlabs, company: Black Forest Labs}
  lever:
    enabled: true
    boards:
      - {slug: mistral, company: Mistral AI}
      - {slug: palantir, company: Palantir, locations: [remote, germany, london, europe]}
  ashby:
    enabled: true
    boards:
      - {slug: openai, company: OpenAI, locations: [remote, germany, london, europe]}
      - {slug: elevenlabs, company: ElevenLabs}
      - {slug: langchain, company: LangChain}
      - {slug: n8n, company: n8n}
      - {slug: weaviate, company: Weaviate}
